services:
  db:
    image: postgres:16
    container_name: module10-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: module10
    ports:
      - "5432:5432"
    volumes:
      - module10_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d module10"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: module10-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/module10
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  module10_postgres_data:
